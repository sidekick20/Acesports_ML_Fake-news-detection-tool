<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerifyAI - Fake News Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <header class="header">
    <div class="brand">
      <div class="logo-box">
        <i class="fas fa-shield-alt"></i>
      </div>
      <div class="brand-text">
        <h1>VerifyAI</h1>
        <p>Fake News Detection</p>
      </div>
    </div>
    <div class="badge">
      <span class="dot"></span>
      <span class="badge-text">AI Powered</span>
    </div>
  </header>

  <main class="card">
    <div class="textarea-container">
      <textarea id="news-input" placeholder="Paste news headline or article here..." maxlength="2000"></textarea>
      <div class="char-count" id="char-count">0/2000</div>
    </div>

    <div class="examples-section">
      <p class="example-label"><i class="fas fa-bolt"></i> Quick Test Examples</p>
      <div class="tag-group">
        <button class="tag" onclick="fillExample('clickbait')"><i class="fas fa-mouse-pointer"></i> Clickbait</button>
        <button class="tag" onclick="fillExample('real')"><i class="far fa-newspaper"></i> Real News</button>
        <button class="tag" onclick="fillExample('ragebait')"><i class="fas fa-exclamation-triangle"></i> Rage Bait</button>
        <button class="tag" onclick="fillExample('pseudoscience')"><i class="fas fa-flask"></i> Pseudoscience</button>
      </div>
    </div>

    <div class="button-group">
      <button id="analyze-btn" class="btn-primary"><i class="fas fa-microchip"></i> Run AI Analysis</button>
      <button id="clear-btn" class="btn-secondary"><i class="fas fa-times"></i> Clear Input</button>
    </div>

    <!-- Spinner -->
    <div id="spinner" style="display:none;" class="spinner-box">
      <i class="fas fa-spinner fa-spin"></i> Analyzing your article...
    </div>

    <!-- Result Box -->
    <div id="result" style="display:none;" class="result-box"></div>
  </main>

  <footer class="disclaimer">
    This tool uses heuristic analysis for demonstration purposes. Always verify news through multiple credible sources.
  </footer>
</div>

<script src="/static/script.js"></script>
</body>
</html>
